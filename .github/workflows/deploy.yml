name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: railwayapp/railway-deploy@v1
        with:
          service: travel-planner
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
